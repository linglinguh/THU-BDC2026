services:
  client:
    image: bdc2026:latest
    pull_policy: never
    volumes:
      - ./data:/app/data
      - ./test/output:/app/output
      - ./temp:/app/temp
    working_dir: /app
    command: /bin/bash /app/data/run.sh
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    privileged: true
    mem_limit: 16g
    memswap_limit: 16g
    cpus: 10.0